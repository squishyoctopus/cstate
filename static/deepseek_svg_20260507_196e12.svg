<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 230" width="100%" height="100%">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EC4899" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
  </defs>

  <!-- TV Outline (containing the X) -->
  <g id="tv-outline">
    <!-- Antennas -->
    <line x1="70" y1="30" x2="45" y2="10" stroke="url(#brandGrad)" stroke-width="6" stroke-linecap="round" />
    <line x1="160" y1="30" x2="185" y2="10" stroke="url(#brandGrad)" stroke-width="6" stroke-linecap="round" />

    <!-- TV Screen (rounded rectangle outline) -->
    <rect x="35" y="30" width="160" height="130" rx="20" fill="none" stroke="url(#brandGrad)" stroke-width="6" />

    <!-- TV Legs -->
    <line x1="55" y1="160" x2="55" y2="185" stroke="url(#brandGrad)" stroke-width="6" stroke-linecap="round" />
    <line x1="175" y1="160" x2="175" y2="185" stroke="url(#brandGrad)" stroke-width="6" stroke-linecap="round" />

    <!-- The "X" inside the screen -->
    <line x1="60" y1="55" x2="170" y2="135" stroke="url(#brandGrad)" stroke-width="16" stroke-linecap="round" />
    <line x1="170" y1="55" x2="60" y2="135" stroke="url(#brandGrad)" stroke-width="16" stroke-linecap="round" />
  </g>

  <!-- "erit" text, placed directly after the TV -->
  <text x="205" y="135" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="100" fill="url(#brandGrad)" letter-spacing="-2">erit</text>
</svg>